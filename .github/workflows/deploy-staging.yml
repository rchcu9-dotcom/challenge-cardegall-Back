name: Backend deploy (staging)

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  ACR_NAME: acrcardegall
  ACR_LOGIN_SERVER: acrcardegall.azurecr.io
  IMAGE_NAME: challenge-cardegall-back
  CONTAINER_APP_NAME: challenge-cardegall-back
  RESOURCE_GROUP: rg-challenge-cardegall-staging
  TAG: staging-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Audit production dependencies (blocking on high/critical)
        run: pnpm audit --prod --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: docker build --no-cache -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$TAG .

      - name: Push Docker image
        run: docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$TAG

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:$TAG

      - name: Wait for container readiness
        env:
          API_BASE_URL: https://challenge-cardegall-back.proudcoast-98490a89.westeurope.azurecontainerapps.io
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$API_BASE_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Container ready."
              break
            fi
            if [ "$i" = "10" ]; then
              echo "Container did not become ready in time."
              exit 1
            fi
            sleep 25
          done
